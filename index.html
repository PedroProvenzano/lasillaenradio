  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" crossorigin="anonymous"/>

  <style>
    /* ── CSS VARIABLES ───────────────────────────────────────────── */
    :root {
      --accent: #2563eb;
      --accent-border: #2563eb66;
      --card-radius: 12px;
    }

    [data-theme="dark"] {
      --bg:           #04040d;
      --surface:      #09091a;
      --surface-2:    #0e0e22;
      --border:       rgba(255,255,255,0.08);
      --text:         #f0f0fa;
      --text-2:       #8888b8;
      --text-3:       #44445a;
      --header-bg:    #020209;
      --nav-bg:       rgba(4,4,13,0.92);
      --footer-bg:    #020209;
      --footer-text:  #ccccd8;
      --footer-text-2:#88889a;
      --footer-text-3:#444458;
    }

    [data-theme="light"] {
      --bg:           #f7f7f4;
      --surface:      #ffffff;
      --surface-2:    #f0f0ec;
      --border:       rgba(0,0,0,0.09);
      --text:         #111118;
      --text-2:       #555565;
      --text-3:       #9999a8;
      --header-bg:    #111118;
      --nav-bg:       rgba(247,247,244,0.92);
      --footer-bg:    #111118;
      --footer-text:  #ccccd8;
      --footer-text-2:#88889a;
      --footer-text-3:#444458;
    }

    /* ── RESET & BASE ────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html {
      font-size: 16px;
      scroll-behavior: smooth;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      line-height: 1.6;
      overflow-x: hidden;
      transition: background 0.3s, color 0.3s;
    }

    /* ── SCROLLBAR ───────────────────────────────────────────────── */
    ::-webkit-scrollbar { width: 8px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--surface-2); border-radius: 4px; }
    ::-webkit-scrollbar-thumb:hover { background: var(--accent); }

    /* ── TYPOGRAPHY ──────────────────────────────────────────────── */
    h1, h2, h3, h4, h5, h6 {
      font-family: 'Space Grotesk', sans-serif;
      color: var(--text);
      line-height: 1.2;
    }

    a { color: var(--accent); text-decoration: none; }
    a:hover { opacity: 0.85; }

    button { font-family: inherit; }

    input, textarea {
      font-family: 'DM Sans', sans-serif;
      font-size: 14px;
      color: var(--text);
    }

    input::placeholder, textarea::placeholder { color: var(--text-3); }

    /* ── TICKER ANIMATION ────────────────────────────────────────── */
    @keyframes ticker {
      0%   { transform: translateX(0); }
      100% { transform: translateX(-50%); }
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.6; }
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(10px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* ── MAIN CONTENT FADE-IN ────────────────────────────────────── */
    main > div {
      animation: fadeIn 0.35s ease both;
    }

    /* ── TICKER ──────────────────────────────────────────────────── */
    .ticker-strip {
      animation: ticker 30s linear infinite; /* duración se sobreescribe por JS */
    }

    /* ── SELECTION ───────────────────────────────────────────────── */
    ::selection {
      background: var(--accent);
      color: #000;
    }

    /* ── FOCUS RING ──────────────────────────────────────────────── */
    button:focus-visible, input:focus-visible {
      outline: 2px solid var(--accent);
      outline-offset: 2px;
    }

    /* ── RESPONSIVE BASE ─────────────────────────────────────────── */
    @media (max-width: 900px) {
      .hero-grid { grid-template-columns: 1fr !important; grid-template-rows: auto !important; }
    }

    /* Header mobile weather: oculto por defecto, visible en mobile */
    .header-mobile-weather { display: none; }

    @media (max-width: 768px) {
      /* 2-column section grids → columna única */
      .two-col-section   { grid-template-columns: 1fr !important; }
      /* Tab imagen+texto → apilado */
      .tab-inner-grid    { grid-template-columns: 1fr !important; }
      .tab-inner-grid > div:first-child { aspect-ratio: 16/9 !important; }
      /* Banner featured en categorías → menos panorámico */
      .featured-banner   { aspect-ratio: 16/9 !important; }
      /* Header mobile: columna centrada con logo + pronóstico */
      .header-inner {
        display: flex !important;
        flex-direction: column !important;
        align-items: center !important;
        gap: 12px !important;
        padding: 14px 20px !important;
      }
      .header-side         { display: none !important; }
      .header-mobile-weather { display: flex !important; justify-content: center; }
      /* Navbar: hamburguesa en lugar de links de categorías */
      .nav-items-desktop { display: none !important; }
      .nav-hamburger     { display: flex !important; }
      .nav-social        { display: none !important; }
      /* Menú móvil desplegable */
      .nav-mobile-menu {
        display: flex !important;
        flex-direction: column;
        gap: 4px;
        padding: 8px 12px 14px;
        background: var(--surface);
        border-bottom: 1px solid var(--border);
      }
      html { font-size: 14px; }
    }

    @media (max-width: 480px) {
      /* Grid 2×2 de espectáculos → columna única en teléfonos chicos */
      .art-inner-grid { grid-template-columns: 1fr !important; }
    }
  </style>
</head>
